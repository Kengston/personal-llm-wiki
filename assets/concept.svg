<svg viewBox="0 0 1200 300" width="1200" height="300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RAG re-derives knowledge every query and needs a vector DB; the LLM-wiki pattern compiles knowledge once into linked Markdown that compounds">
  <defs>
    <marker id="aMuted" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#7d8590"/></marker>
    <marker id="aGreen" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#3fb950"/></marker>
  </defs>

  <!-- ===== LEFT: RAG ===== -->
  <rect x="24" y="20" width="540" height="260" rx="14" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="48" y="58" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="20" font-weight="700" fill="#d29922">RAG — “chat with your notes” (typical)</text>

  <g font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#adbac7">
    <rect x="48"  y="104" width="104" height="48" rx="9" fill="#1c2129" stroke="#484f58" stroke-width="1.5"/>
    <text x="100" y="133" text-anchor="middle" fill="#e6edf3">Question</text>
    <rect x="206" y="96"  width="190" height="64" rx="9" fill="#1c2129" stroke="#d2992266" stroke-width="1.5"/>
    <text x="301" y="122" text-anchor="middle" fill="#d29922">Vector DB</text>
    <text x="301" y="142" text-anchor="middle" font-size="12.5" font-weight="500" fill="#7d8590">embed + retrieve top-k chunks</text>
    <rect x="450" y="104" width="92"  height="48" rx="9" fill="#1c2129" stroke="#484f58" stroke-width="1.5"/>
    <text x="496" y="133" text-anchor="middle" fill="#e6edf3">Answer</text>
  </g>
  <g stroke="#7d8590" stroke-width="2" fill="none">
    <line x1="152" y1="128" x2="200" y2="128" marker-end="url(#aMuted)"/>
    <line x1="396" y1="128" x2="444" y2="128" marker-end="url(#aMuted)"/>
    <path d="M496,152 C496,196 100,196 100,156" stroke="#d29922" stroke-dasharray="5 5" marker-end="url(#aMuted)"/>
  </g>
  <text x="300" y="210" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-style="italic" fill="#d29922">…re-derived from scratch on every query</text>
  <text x="300" y="252" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13.5" fill="#7d8590">Needs an embedder + vector store. Nothing accumulates.</text>

  <!-- ===== vs ===== -->
  <circle cx="600" cy="150" r="22" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <text x="600" y="157" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="16" font-weight="800" fill="#7d8590">vs</text>

  <!-- ===== RIGHT: LLM-wiki ===== -->
  <rect x="636" y="20" width="540" height="260" rx="14" fill="#161b22" stroke="#2ea04355" stroke-width="2"/>
  <text x="660" y="58" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="20" font-weight="700" fill="#3fb950">LLM-wiki — this project</text>

  <g font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13.5" font-weight="600">
    <rect x="660" y="104" width="96"  height="48" rx="9" fill="#1c2129" stroke="#484f58" stroke-width="1.5"/>
    <text x="708" y="127" text-anchor="middle" fill="#e6edf3">Sources</text>
    <text x="708" y="143" text-anchor="middle" font-size="11" font-weight="500" fill="#7d8590">chats · notes</text>
    <rect x="792" y="104" width="104" height="48" rx="9" fill="#13241b" stroke="#2ea04388" stroke-width="1.5"/>
    <text x="844" y="133" text-anchor="middle" fill="#3fb950">compile once</text>
    <rect x="932" y="96"  width="150" height="64" rx="9" fill="#1c2129" stroke="#58a6ff66" stroke-width="1.5"/>
    <text x="1007" y="122" text-anchor="middle" fill="#58a6ff">Markdown wiki</text>
    <text x="1007" y="142" text-anchor="middle" font-size="11.5" font-weight="500" fill="#7d8590">linked · grows · git diff</text>
    <rect x="1106" y="104" width="50" height="48" rx="9" fill="#1c2129" stroke="#484f58" stroke-width="1.5"/>
    <text x="1131" y="127" text-anchor="middle" fill="#e6edf3" font-size="12">read</text>
    <text x="1131" y="142" text-anchor="middle" fill="#7d8590" font-size="10.5" font-weight="500">+rank</text>
  </g>
  <g stroke="#3fb950" stroke-width="2" fill="none">
    <line x1="756" y1="128" x2="788" y2="128" marker-end="url(#aGreen)"/>
    <line x1="896" y1="128" x2="928" y2="128" marker-end="url(#aGreen)"/>
    <line x1="1082" y1="128" x2="1102" y2="128" marker-end="url(#aGreen)"/>
  </g>
  <text x="906" y="210" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-style="italic" fill="#3fb950">compiled once → then kept current, compounding</text>
  <text x="906" y="252" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13.5" fill="#7d8590">Retrieval = read index + links. No embedder. Fully transparent.</text>
</svg>
