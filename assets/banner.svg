<svg viewBox="0 0 1200 360" width="1200" height="360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="personal-llm-wiki — Second Brain: a self-maintaining Markdown wiki, no vector DB, Claude-native, Telegram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.55" stop-color="#7c8cff"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="360" rx="18" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1197" height="357" rx="16.5" fill="none" stroke="#30363d" stroke-width="2"/>
  <circle cx="945" cy="180" r="235" fill="url(#glow)"/>

  <!-- knowledge graph: interlinked wiki pages -->
  <g stroke="#30363d" stroke-width="2" fill="none" opacity="0.95">
    <line x1="945" y1="180" x2="838" y2="108"/>
    <line x1="945" y1="180" x2="1068" y2="118"/>
    <line x1="945" y1="180" x2="1090" y2="242"/>
    <line x1="945" y1="180" x2="928" y2="286"/>
    <line x1="945" y1="180" x2="820" y2="224"/>
    <line x1="838" y1="108" x2="1000" y2="86"/>
    <line x1="1068" y1="118" x2="1000" y2="86"/>
    <line x1="1068" y1="118" x2="1112" y2="180"/>
    <line x1="1090" y1="242" x2="1112" y2="180"/>
    <line x1="928" y1="286" x2="1090" y2="242"/>
    <line x1="820" y1="224" x2="928" y2="286"/>
    <line x1="820" y1="224" x2="838" y2="108"/>
  </g>
  <g>
    <circle cx="1000" cy="86"  r="6"  fill="#6e7681"/>
    <circle cx="1112" cy="180" r="6"  fill="#6e7681"/>
    <circle cx="838"  cy="108" r="9"  fill="#58a6ff"/>
    <circle cx="1068" cy="118" r="9"  fill="#58a6ff"/>
    <circle cx="1090" cy="242" r="8"  fill="#3fb950"/>
    <circle cx="928"  cy="286" r="9"  fill="#3fb950"/>
    <circle cx="820"  cy="224" r="8"  fill="#a371f7"/>
    <circle cx="945"  cy="180" r="18" fill="url(#accent)"/>
    <circle cx="945"  cy="180" r="18" fill="none" stroke="#0d1117" stroke-width="3"/>
  </g>

  <!-- wordmark -->
  <text x="64" y="92" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="17" font-weight="600" letter-spacing="4" fill="#7d8590">KARPATHY · LLM-WIKI · PATTERN</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="82" font-weight="800" fill="#e6edf3">Second Brain</text>
  <text x="66" y="220" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="25" font-weight="700" fill="url(#accent)">personal-llm-wiki · Второй мозг</text>
  <text x="66" y="262" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="19" fill="#adbac7">A personal AI assistant as a self-maintaining Markdown wiki.</text>

  <!-- chips -->
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" font-weight="600">
    <g>
      <rect x="64"  y="296" width="132" height="32" rx="16" fill="#1c2129" stroke="#3fb95066" stroke-width="1.5"/>
      <text x="130" y="317" fill="#3fb950" text-anchor="middle">no vector DB</text>
    </g>
    <g>
      <rect x="206" y="296" width="138" height="32" rx="16" fill="#1c2129" stroke="#58a6ff66" stroke-width="1.5"/>
      <text x="275" y="317" fill="#58a6ff" text-anchor="middle">Claude-native</text>
    </g>
    <g>
      <rect x="354" y="296" width="180" height="32" rx="16" fill="#1c2129" stroke="#2ea04366" stroke-width="1.5"/>
      <text x="444" y="317" fill="#2ea043" text-anchor="middle">reactive + proactive</text>
    </g>
    <g>
      <rect x="544" y="296" width="158" height="32" rx="16" fill="#1c2129" stroke="#a371f766" stroke-width="1.5"/>
      <text x="623" y="317" fill="#a371f7" text-anchor="middle">two-repo privacy</text>
    </g>
  </g>
</svg>
